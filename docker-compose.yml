services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: competiq
      POSTGRES_PASSWORD: competiq
      POSTGRES_DB: competiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  langfuse_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      - langfuse_db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse_db:5432/langfuse
      NEXTAUTH_SECRET: change_me_in_local_dev
      SALT: change_me_in_local_dev
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"

volumes:
  postgres_data:
  redis_data:
  langfuse_data:
